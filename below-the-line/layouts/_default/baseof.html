<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
  {{ block "head_extra" . }}{{ end }}
</head>
<body>
  {{ partial "nav.html" . }}

  <main class="content-page">
    {{ block "main" . }}
      {{ .Content }}
    {{ end }}
  </main>

  {{ partial "footer.html" . }}

  <style>
    .content-page {
      max-width: 700px;
      font-size: 17px;
      line-height: 1.55;
    }

    .content-page h1 {
      margin-bottom: var(--space-lg);
    }

    .content-page h2 {
      margin-top: var(--space-xl);
      margin-bottom: var(--space-md);
    }

    .content-page p,
    .content-page ul,
    .content-page ol {
      margin-bottom: var(--space-md);
      color: #d8d1c4;
    }

    .content-page blockquote {
      border-left: 2px solid var(--bench);
      padding-left: var(--space-md);
      margin: var(--space-lg) 0;
      color: var(--dim);
      font-style: italic;
    }

    .content-page table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-lg) 0;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .content-page th,
    .content-page td {
      padding: var(--space-sm) var(--space-md);
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    .content-page th {
      color: var(--dim);
      font-size: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .content-page hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: var(--space-xl) 0;
    }

    .content-page em {
      color: var(--bench);
    }
  </style>
</body>
</html>
