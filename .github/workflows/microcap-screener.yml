name: Micro Cap Innovation Screener

on:
  workflow_run:
    workflows: ["Weekly Stock Data Update and Deploy"]
    types:
      - completed
  workflow_dispatch:

jobs:
  screen-microcaps:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Run micro cap screener
        run: |
          cd below-the-line
          python scripts/microcap/microcap_innovation_screener_v2.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add below-the-line/assets/data/microcap_screener.json
          git diff --staged --quiet || git commit -m "Update micro cap screener results [$(date +%Y-%m-%d)]"
          git pull --rebase origin main
          git push

      # The weekly deploy finishes before this workflow commits fresh screener
      # data, so without a rebuild here the live /microcaps/ page is always at
      # least one week stale. Rebuild and deploy after committing.
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.0'
          extended: true

      - name: Install Node dependencies
        run: |
          cd below-the-line
          npm install

      - name: Build site
        run: |
          cd below-the-line
          hugo --minify

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './below-the-line/public'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
