name: Micro Cap Innovation Screener

on:
  workflow_run:
    workflows: ["Weekly Stock Data Update and Deploy"]
    types:
      - completed
  workflow_dispatch:

jobs:
  screen-microcaps:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Run micro cap screener
        run: |
          cd below-the-line
          python scripts/microcap/microcap_innovation_screener_v2.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add below-the-line/assets/data/microcap_screener.json
          git diff --staged --quiet || git commit -m "Update micro cap screener results [$(date +%Y-%m-%d)]"
          git push
