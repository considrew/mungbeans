name: Weekly Email Send

on:
  workflow_run:
    workflows: ["Weekly Stock Data Update and Deploy"]
    types:
      - completed
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    # Only run if the main workflow succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send weekly email
        run: |
          cd below-the-line
          python scripts/send_weekly_email.py
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZEPTOMAIL_API_TOKEN: ${{ secrets.ZEPTOMAIL_API_TOKEN }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
